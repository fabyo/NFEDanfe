name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_only:
        description: Publish an existing release without creating a new GitHub release
        required: false
        type: boolean
        default: false
      ref:
        description: Git ref to publish from when publish_only is enabled
        required: false
        type: string
        default: main

permissions: read-all

jobs:
  release:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.publish_only }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Prepare release pull request or GitHub Release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger required checks for release pull request
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          release_branch="$(gh pr list --state open --label 'autorelease: pending' --json headRefName --jq '.[0].headRefName')"
          test -n "$release_branch"
          gh workflow run ci.yml --ref "$release_branch"
          gh workflow run codeql.yml --ref "$release_branch"

      - name: Checkout released commit
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.sha }}

      - name: Setup .NET
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Validate release version
        if: ${{ steps.release.outputs.release_created == 'true' }}
        shell: pwsh
        run: |
          $releaseVersion = '${{ steps.release.outputs.version }}'
          $declaredVersion = (Get-Content version.txt -Raw).Trim()
          $buildVersion = (dotnet msbuild NFEDanfe/NFEDanfe.csproj -getProperty:Version).Trim()
          if ($releaseVersion -ne $declaredVersion -or $releaseVersion -ne $buildVersion) {
            throw "Release ($releaseVersion), version.txt ($declaredVersion), and MSBuild ($buildVersion) must match."
          }

      - name: Restore
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: dotnet restore NFEDanfe.slnx --locked-mode

      - name: Build
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: dotnet build NFEDanfe.slnx --configuration Release --no-restore

      - name: Test
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: dotnet test NFEDanfe.Tests/NFEDanfe.Tests.csproj --configuration Release --no-build --no-restore

      - name: Pack
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: dotnet pack NFEDanfe.slnx --configuration Release --no-build --output artifacts

      - name: Validate NuGet packages
        if: ${{ steps.release.outputs.release_created == 'true' }}
        shell: pwsh
        run: ./eng/Validate-Packages.ps1 -ArtifactsPath artifacts -Version '${{ steps.release.outputs.version }}'

      - name: NuGet Login
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: login
        with:
          user: fabyoguima

      - name: Publish NuGet packages
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Attach packages to GitHub Release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload '${{ steps.release.outputs.tag_name }}' artifacts/*.nupkg --clobber

  publish-existing:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Validate release version
        shell: pwsh
        run: |
          $declaredVersion = (Get-Content version.txt -Raw).Trim()
          $buildVersion = (dotnet msbuild NFEDanfe/NFEDanfe.csproj -getProperty:Version).Trim()
          if ($declaredVersion -ne $buildVersion) {
            throw "version.txt ($declaredVersion) and MSBuild ($buildVersion) must match."
          }

      - name: Restore
        run: dotnet restore NFEDanfe.slnx --locked-mode

      - name: Build
        run: dotnet build NFEDanfe.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test NFEDanfe.Tests/NFEDanfe.Tests.csproj --configuration Release --no-build --no-restore

      - name: Pack
        run: dotnet pack NFEDanfe.slnx --configuration Release --no-build --output artifacts

      - name: Validate NuGet packages
        shell: pwsh
        run: |
          $version = (Get-Content version.txt -Raw).Trim()
          ./eng/Validate-Packages.ps1 -ArtifactsPath artifacts -Version $version

      - name: NuGet Login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: login
        with:
          user: fabyoguima

      - name: Publish NuGet packages
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
