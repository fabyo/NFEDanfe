name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag or commit to publish
        required: false
        type: string
        default: main

concurrency:
  group: nuget-publish
  cancel-in-progress: false

permissions: read-all

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Validate release version
        shell: pwsh
        run: |
          $declaredVersion = (Get-Content version.txt -Raw).Trim()
          $buildVersion = (dotnet msbuild NFEDanfe/NFEDanfe.csproj -getProperty:Version).Trim()
          if ($declaredVersion -ne $buildVersion) {
            throw "version.txt ($declaredVersion) and MSBuild ($buildVersion) must match."
          }

      - name: Restore
        run: dotnet restore NFEDanfe.slnx --locked-mode

      - name: Verify formatting
        run: dotnet format NFEDanfe.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build NFEDanfe.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test NFEDanfe.Tests/NFEDanfe.Tests.csproj --configuration Release --no-build --no-restore

      - name: Pack
        run: dotnet pack NFEDanfe.slnx --configuration Release --no-build --output artifacts

      - name: Validate NuGet packages
        shell: pwsh
        run: |
          $version = (Get-Content version.txt -Raw).Trim()
          ./eng/Validate-Packages.ps1 -ArtifactsPath artifacts -Version $version

      - name: NuGet Login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: login
        with:
          user: fabyoguima

      - name: Publish NuGet packages
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
