name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions: read-all

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore NFEDanfe.slnx --locked-mode

    - name: Validate centralized version
      shell: pwsh
      run: |
        $declaredVersion = (Get-Content version.txt -Raw).Trim()
        $buildVersion = (dotnet msbuild NFEDanfe/NFEDanfe.csproj -getProperty:Version).Trim()
        if ($declaredVersion -ne $buildVersion) {
          throw "version.txt ($declaredVersion) differs from MSBuild Version ($buildVersion)."
        }

    - name: Build
      run: dotnet build NFEDanfe.slnx --configuration Release --no-restore

    - name: Test
      run: |
        dotnet test NFEDanfe.Tests/NFEDanfe.Tests.csproj \
          --configuration Release \
          --no-build \
          --verbosity detailed \
          --logger "console;verbosity=detailed" \
          --logger "trx;LogFileName=test-results.trx"

    - name: Pack
      run: dotnet pack NFEDanfe.slnx --configuration Release --no-build --output artifacts

    - name: Validate NuGet packages
      shell: pwsh
      run: ./eng/Validate-Packages.ps1 -ArtifactsPath artifacts -Version (Get-Content version.txt -Raw).Trim()

    - name: Upload NuGet packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: nuget-packages
        path: artifacts/*.nupkg
        if-no-files-found: error

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results
        path: NFEDanfe.Tests/TestResults/test-results.trx
