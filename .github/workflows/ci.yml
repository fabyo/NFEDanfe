name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore NFEDanfe.slnx

    - name: Build
      run: dotnet build NFEDanfe.slnx --configuration Release --no-restore

    - name: Test
      run: |
        dotnet test NFEDanfe.Tests/NFEDanfe.Tests.csproj \
          --configuration Release \
          --no-build \
          --verbosity detailed \
          --logger "console;verbosity=detailed" \
          --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: NFEDanfe.Tests/TestResults/test-results.trx
